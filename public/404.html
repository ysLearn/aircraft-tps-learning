<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞行器结构防隔热学习平台</title>
  <script>
    // Redirect 404s to the SPA preserving the path as hash
    var path = window.location.pathname.replace(/\/$/, '') || '/';
    if (path !== '/') {
      sessionStorage.setItem('redirect', path);
    }
    window.location.replace('/');
  </script>
</head>
<body><p>正在跳转...</p></body>
</html>
